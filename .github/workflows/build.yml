name: build

on:
  push:
    branches: [main, master, "backend/**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_type != 'tag' }}

permissions:
  contents: read

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"

jobs:
  windows-release:
    name: Windows release build
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore REPlayer.sln -r win-x64

      - name: Build with warnings as errors
        run: dotnet build REPlayer.sln -c Release --no-restore -warnaserror

      - name: Run concurrent-agent behavioral probe
        run: dotnet run --project runtime-src/ReplayerAutomationProbe/ReplayerAutomationProbe.csproj -c Release --no-build

      - name: Validate Agent Center, installer contract, and repository tree
        shell: pwsh
        run: |
          python scripts/validation/agent-center/validate_agent_center.py
          python scripts/validation/installer/validate_setup_pipeline.py
          python scripts/validation/repository/audit_release_tree.py --root .

      - name: Publish self-contained Windows application
        shell: pwsh
        run: |
          $version = if ($env:GITHUB_REF_TYPE -eq 'tag') { $env:GITHUB_REF_NAME } else { 'ci-' + $env:GITHUB_SHA.Substring(0, 12) }
          $packageVersion = if ($env:GITHUB_REF_TYPE -eq 'tag') { $env:GITHUB_REF_NAME -replace '^v', '' } else { '0.1.0-ci' }
          $publishDirectory = Join-Path $PWD 'dist\publish'
          $assetDirectory = Join-Path $PWD 'dist\assets'
          New-Item -ItemType Directory -Path $publishDirectory, $assetDirectory -Force | Out-Null

          dotnet publish ReVM/ReVM.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            --no-restore `
            -p:Version=$packageVersion `
            -p:PublishSingleFile=false `
            -p:DebugType=None `
            -p:DebugSymbols=false `
            -o $publishDirectory
          if ($LASTEXITCODE -ne 0) { throw "dotnet publish failed with exit code $LASTEXITCODE" }

          $requiredNotices = @(
            (Join-Path $publishDirectory 'LICENSE.txt'),
            (Join-Path $publishDirectory 'THIRD_PARTY_NOTICES.md'),
            (Join-Path $publishDirectory 'THIRD_PARTY\ANDROID-LOGO-NOTICE.md')
          )
          foreach ($notice in $requiredNotices) {
            if (-not (Test-Path -LiteralPath $notice -PathType Leaf)) {
              throw "Published application is missing required notice: $notice"
            }
          }

          [ordered]@{
            schema = 1
            product = 'REPlayer'
            version = $version
            commit = $env:GITHUB_SHA
            artifactKind = 'self-contained-win-x64-application'
            runtimeIncluded = $false
            builtAtUtc = [DateTime]::UtcNow.ToString('o')
          } | ConvertTo-Json | Set-Content -LiteralPath (Join-Path $publishDirectory 'replayer-build.json') -Encoding UTF8

          $archiveName = "REPlayer-$version-win-x64-app.zip"
          $archivePath = Join-Path $assetDirectory $archiveName
          Compress-Archive -Path (Join-Path $publishDirectory '*') -DestinationPath $archivePath -CompressionLevel Optimal
          $sha256 = (Get-FileHash -LiteralPath $archivePath -Algorithm SHA256).Hash.ToLowerInvariant()
          "$sha256  $archiveName" | Set-Content -LiteralPath (Join-Path $assetDirectory "$archiveName.sha256") -Encoding ASCII

      - name: Upload Windows application artifact
        uses: actions/upload-artifact@v4
        with:
          name: REPlayer-win-x64-app
          path: dist/assets/*
          if-no-files-found: error
          retention-days: 14

  draft-release:
    name: Draft tagged release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: windows-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download verified release assets
        uses: actions/download-artifact@v4
        with:
          name: REPlayer-win-x64-app
          path: release-assets

      - name: Create draft GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -t assets < <(find release-assets -maxdepth 1 -type f -print | sort)
          test "${#assets[@]}" -ge 2
          release_flags=(--draft)
          if [[ "$GITHUB_REF_NAME" == *-* && ! "$GITHUB_REF_NAME" =~ -rc\.[0-9]+$ ]]; then
            release_flags+=(--prerelease)
          fi
          gh release create "$GITHUB_REF_NAME" "${assets[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            "${release_flags[@]}" \
            --generate-notes \
            --title "REPlayer $GITHUB_REF_NAME"
