name: build

on:
  push:
    branches: [ main, master, "backend/**" ]
  pull_request:

permissions:
  contents: read

jobs:
  windows-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - name: Restore
        run: dotnet restore REPlayer.sln
      - name: Build
        run: dotnet build REPlayer.sln -c Release --no-restore -warnaserror
